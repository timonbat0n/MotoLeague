backend:
  name: github
  repo: timobat0n/MotoLeague # ПРОВЕРЬ ЛОГИН (должен быть как в ссылке на гитхаб)
  branch: main # ветка, которую мы настроили в Netlify
  base_url: https://api.netlify.com # ДОБАВЬ ЭТУ СТРОКУ, если её нет
  auth_endpoint: git-gateway
  
media_folder: "images" # куда будут загружаться новые афиши
public_folder: "/images"

collections:
  - name: "home"
    label: "Главная страница"
    files:
      - file: "data/home.json"
        label: "Контент сайта"
        name: "home_content"
        fields:
          - { label: "Верхнее слово (Moto)", name: "h1_span", widget: "string" }
          - { label: "Нижнее слово (Fest)", name: "h1_main", widget: "string" }
          - { label: "Описание (текст)", name: "description", widget: "text" }
          - { label: "Дата", name: "event_date", widget: "string" }
          - { label: "Афиша", name: "afisha", widget: "image" }

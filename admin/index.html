<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MotoFest | Admin Panel</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    /* Стили для страницы входа */
    body {
      background: #121212; /* Глубокий темный фон */
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      overflow: hidden;
    }

    /* Декоративный фон с эффектом гаража/металла */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, rgba(255, 69, 0, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Стилизация самого виджета Netlify Identity через CSS-переменные */
    :root {
      --nc-bg: #1e1e1e;
      --nc-accent: #ff4500; /* Оранжевый «мотоциклетный» цвет */
    }

    /* Наводим красоту на заголовок, пока грузится CMS */
    .loading-screen {
      text-align: center;
      z-index: 10;
    }

    .loading-screen h1 {
      font-size: 3rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 20px;
      color: #ff4500;
      text-shadow: 2px 2px 10px rgba(255, 69, 0, 0.5);
    }

    /* Анимация мигания как у неоновой вывески */
    .neon {
      animation: flicker 1.5s infinite alternate;
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 22%, 24%, 55% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="loading-screen">
    <h1 class="neon">Moto<span>Fest</span></h1>
    <p>Admin Access Control</p>
    <div data-netlify-identity-button></div>
  </div>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>

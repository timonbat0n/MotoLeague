<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MotoFest Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      color: #ff4500;
    }
    .login-box {
      text-align: center;
      border: 2px solid #ff4500;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255, 69, 0, 0.3);
    }
    h1 {
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 30px;
    }
    /* Скрываем дубликаты кнопок, которые генерирует CMS */
    #nc-root .nc-login-page-button {
        display: none !important;
    }
    /* Скрываем стандартную панель навигации CMS, которая лезет поверх */
#nc-root header {
    display: none !important;
}

/* Скрываем контейнер, который создает эту белую полосу по центру */
#nc-root div[class*="AppHeaderScope"] {
    display: none !important;
}

/* Убираем стандартную обертку, которая центрирует дефолтные элементы */
.nc-app-layout-main {
    background: transparent !important;
}

/* Центрируем твой login-box, чтобы его ничего не перекрывало */
.login-box {
    position: relative;
    z-index: 9999;
    background: #121212; /* Добавим фон, чтобы под ним ничего не просвечивало */
}
  </style>
</head>
<body>
  <div class="login-box">
    <h1>MotoFest <span>Control</span></h1>
    <div data-netlify-identity-button></div>
  </div>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
   async function loadContent() {
    try {
        const response = await fetch('./data/home.json?v=' + Date.now());
        const data = await response.json();

        // Безопасная вставка заголовка
        const titleEl = document.getElementById('main-title');
        titleEl.innerHTML = `<span>${data.h1_span || 'Moto'}</span><br>${data.h1_main || 'Fest'}`;

        // Описание с ограничением по ширине
        const descEl = document.getElementById('main-desc');
        descEl.innerText = data.description || 'Описание скоро появится...';

        // Дата
        document.getElementById('event_date').innerText = data.event_date || 'Дата уточняется';

        // Афиша (если картинки нет, можно скрыть блок или поставить дефолт)
        const afishaEl = document.getElementById('main-afisha');
        if (data.afisha) {
            afishaEl.src = data.afisha;
            afishaEl.style.display = 'block';
        }
    } catch (e) {
        console.error("Ошибка оформления:", e);
    }
}
  </script>
</body>
</html>
